<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fishy Icon Generator</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 1024px;
      height: 1024px;
    }
  </style>
</head>
<body>
  <canvas id="iconCanvas" width="1024" height="1024"></canvas>
  <script type="module">
    import { Fish } from './fish/fish.js';

    window.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('iconCanvas');
      const ctx = canvas.getContext('2d');

      // Create a gorgeous gradient background (deep blue ocean depth)
      const grad = ctx.createRadialGradient(512, 512, 100, 512, 512, 600);
      grad.addColorStop(0, '#091930');
      grad.addColorStop(1, '#030812');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1024, 1024);

      // Draw subtle glowing concentric ripples to represent the interactive water theme
      ctx.strokeStyle = 'rgba(0, 180, 255, 0.18)';
      ctx.lineWidth = 6;
      for (let r = 180; r <= 480; r += 120) {
        ctx.beginPath();
        ctx.arc(512, 512, r, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Create a large, premium fish centered on the canvas
      // Fish constructor: Fish(x, y, vx, vy, radius, color = "#f0654e")
      const fishSize = 175;
      const fish = new Fish(512, 512, 1, -1, fishSize, '#f0654e');
      
      // Rotate the fish to swim diagonally towards the top right
      fish.drawAngle = -Math.PI / 4;
      fish.angle1 = fish.drawAngle;
      fish.angle2 = fish.drawAngle;
      fish.angle2b = fish.drawAngle;
      fish.angle3 = fish.drawAngle + Math.PI;
      fish.angle4 = fish.drawAngle + Math.PI;
      fish.angle5 = fish.drawAngle + Math.PI;
      fish.angle6 = fish.drawAngle + Math.PI;
      fish.tailWorldAngle = fish.drawAngle + Math.PI;

      // Draw the beautiful vector fish using the app's native rendering logic
      fish.draw(ctx);

      // Export canvas to base64 and send to main process to write to disk
      const dataUrl = canvas.toDataURL('image/png');
      const { ipcRenderer } = require('electron');
      ipcRenderer.send('save-icon', dataUrl);
    });
  </script>
</body>
</html>
